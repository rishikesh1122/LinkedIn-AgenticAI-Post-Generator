name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi

          http_status=$(curl --silent --show-error --location --request POST \
            --output /tmp/render-hook-response.txt \
            --write-out "%{http_code}" \
            "$RENDER_DEPLOY_HOOK")

          echo "Render deploy hook returned HTTP $http_status"
          cat /tmp/render-hook-response.txt

          case "$http_status" in
            2*|3*)
              exit 0
              ;;
            *)
              exit 1
              ;;
          esac